<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max-with</title>
    <style>
        h1{
            color: yellow;
        }
        @media screen and (max-width:600px){
            h1{
                color: blue;
            }
        }
        @media screen and (max-width:400px){
            h1{
                color: red;
            }
        }
    </style>
</head>
<body>
    <H1>HELLO</H1>
</body>
</html>
